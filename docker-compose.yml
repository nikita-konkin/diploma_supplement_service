services:

  python-engine:
      build:
          context: ./python-engine
          dockerfile: Dockerfile
      container_name: diploma-python-engine
      ports:
          - "8000:8000"  # Expose for debugging (optional)
      expose:
          - 8000
      environment:
          - PYTHONUNBUFFERED=1
          - LOG_LEVEL=INFO
      networks:
          - mynetwork
      healthcheck:
          test:
              [
                  "CMD-SHELL",
                  'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'', timeout=2)"',
              ]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 10s
      restart: unless-stopped

  python-xml-engine:
      build:
          context: ./python-xml-engine
          dockerfile: Dockerfile
      container_name: diploma-python-xml-engine
      ports:
          - "8001:8001"  # Expose for debugging (optional)
      expose:
          - 8001
      environment:
          - PYTHONUNBUFFERED=1
          - LOG_LEVEL=INFO
      networks:
          - mynetwork
      healthcheck:
          test:
              [
                  "CMD-SHELL",
                  'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8001/health'', timeout=2)"',
              ]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 10s
      restart: unless-stopped

  java-gateway:
      build:
          context: ./java-api
          dockerfile: Dockerfile
      container_name: xlsx-java-gateway
      ports:
          - "8080:8080"  # Public-facing port
      expose:
          - 8080
      env_file:
          - .env
      environment:
          - PYTHON_ENGINE_URL=http://python-engine:8000
          - PYTHON_XML_ENGINE_URL=http://python-xml-engine:8001
          - JAVA_OPTS=-Xmx512m -Xms256m
      depends_on:
          python-engine:
              condition: service_healthy
          python-xml-engine:
              condition: service_healthy
      networks:
          - mynetwork
      healthcheck:
          test:
              [
                  "CMD",
                  "wget",
                  "--quiet",
                  "--tries=1",
                  "--spider",
                  "http://localhost:8080/health",
              ]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 15s
      restart: unless-stopped


networks:
    mynetwork:
      driver: bridge
      name: xlsx-pivot-network


